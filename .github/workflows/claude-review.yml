name: Claude PR Review

# Quality / correctness review on every PR, via Anthropic's first-party action.
# Auth: CLAUDE_CODE_OAUTH_TOKEN (from `claude setup-token`) — runs free under the
# Claude Max subscription. Uses `pull_request` (NOT pull_request_target) so it runs
# in the fork's restricted context — never the base-repo context with secrets.
# Pin: claude-code-action must be >= v1.0.94 (fixes the CVSS-9.4 prompt-injection /
# secret-exfiltration chain disclosed 2026-06-05). @v1 resolves to the latest patched 1.x.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1   # >= v1.0.94 (CVSS-9.4 fix)
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: /code-review
